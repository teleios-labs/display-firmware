[build]
target = "riscv32imafc-esp-espidf"

[target.riscv32imafc-esp-espidf]
linker = "ldproxy"
# espflash's bundled bootloader crashes pre-v3.0 P4 silicon; wrapper uses the ESP-IDF bootloader.
runner = "./scripts/flash.sh"

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32p4"
ESP_IDF_VERSION = "v5.5.2"
ESP_IDF_SDKCONFIG_DEFAULTS = { value = "/Users/joelbell/teleios/display-firmware/firmware/sdkconfig.defaults", relative = false }
ESP_IDF_SYS_ROOT_CRATE = "display-firmware"
